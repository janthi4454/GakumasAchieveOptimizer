name: Pages

on:
  push:
    branches: [main, beta]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: ./.github/actions/build-site
        with:
          subpath: ''
          artifact-name: build-main

  build-beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta
      - uses: ./.github/actions/build-site
        with:
          subpath: beta
          artifact-name: build-beta

  deploy:
    needs: [build-main, build-beta]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-main
          path: site
      - uses: actions/download-artifact@v4
        with:
          name: build-beta
          path: site/beta
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
